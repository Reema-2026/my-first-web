<!DOCTYPE html>
<html>
    <head>
        <title>موقعي الاول</title>
        <style>
            body{
                background-color: #c0bebe;
                font-family: Arial;
                text-align: center;
                margin-top: 80px;
            }
            input{
                padding: 10px;
                width: 200px;
                margin: 10px;
            }
            button{
                padding: 10px;
                cursor: pointer;
            }
            h2{
                color:rgb(10, 6, 217);
            }
          
        </style>
    </head>
    <body>
        <h1>موقعي الشخصي </h1>
        <p>انا اتعلم تطوير الويب   </p>
         <input id="input"placeholder="ريما بنت عتيق">

        <button onclick="showName()">
عرض الاسم
        </button> 

        <h2 id="result">
        </h2>

        <script>
            function showName(){
                 let name = document.getElementById("input").value;
                document.getElementById("result").innerText = "مرحبا " + name + "!";}
        </script>
    </body>
</html>
