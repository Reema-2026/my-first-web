<!DOCTYPE html>
<html>

<head>
  <title>بروفايلي</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #eef2ff;
      margin-top: 60px;
    }

    .card {
      background: white;
      width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 10px #ccc;
    }

    h1 {
      color: #4a5cff;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>

</head>

<body>

  <div class="card">

    <h1>موقعي الشخصي 👩‍💻</h1>

    <p>مطور ويب مبتدئ</p>

    <input id="input" placeholder="اكتب اسمك">

    <br>

    <button onclick="showName()">عرض الترحيب</button>

    <h2 id="result"></h2>

  </div>

  <script>
    function showName() {
      let name = document.getElementById("input").value;
      document.getElementById("result").innerText =
        "هلا " + name + " 👋";
    }
  </script>

</body>

</html>
